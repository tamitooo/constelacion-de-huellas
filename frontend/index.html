<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constelación de Huellas</title>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- UNIVERSO: contenedor fijo a pantalla completa -->
  <div id="universo-contenedor">

    <!-- VIEWPORT: este es el que la cámara mueve/escala (pan y zoom) -->
    <div id="universo-viewport">
      <div id="fondo-espacial" aria-hidden="true"></div>
      <div id="capa-estrellas"></div>
    </div>

    <!--
      CANVAS DE CONEXIONES — vive FUERA del viewport, a propósito.
      Las estrellas guardan coordenadas de ventana (no del viewport
      transformado), así que el canvas también debe ser fijo en
      pantalla para que las líneas coincidan con las estrellas.
    -->
    <canvas id="capa-conexiones" aria-hidden="true"></canvas>

  </div>

  <!-- FORMULARIO -->
  <main id="capa-formulario">
    <h1 id="titulo-poetico">¿Qué huella permanece contigo?</h1>
    <form id="form-huella" autocomplete="off">
      <textarea
        id="input-huella"
        name="huella"
        placeholder="Escribe un recuerdo que quieras convertir en una estrella..."
        maxlength="280"
        rows="3"
        required
      ></textarea>
      <p id="contador-caracteres">280 caracteres restantes</p>
      <button id="btn-enviar" type="submit">Enviar</button>
    </form>
  </main>

  <!-- PROCESO -->
  <section id="capa-proceso" class="oculto" aria-live="polite">
    <p id="texto-proceso">El universo está leyendo tu recuerdo...</p>
    <div id="estrella-naciente" class="oculto" aria-hidden="true"></div>
    <div id="resultado-huella" class="oculto">
      <p id="resultado-categoria"></p>
      <p id="resultado-emocion"></p>
    </div>
    <button id="boton-reintentar" class="boton-volver oculto" type="button">
      Reintentar
    </button>
  </section>

  <button id="boton-volver" class="boton-volver-flotante oculto" type="button">
    ← Volver
  </button>

  <!--
    CONTROLES DE ZOOM — alternativa a la rueda/trackpad, más
    predecible (cada click = un paso fijo). Comparten visibilidad
    con #boton-volver: solo aparecen durante la exploración libre
    de la constelación (ui.js los muestra/oculta junto al botón
    "Volver").
  -->
  <div id="controles-zoom" class="oculto">
    <button id="boton-zoom-mas" type="button" aria-label="Acercar">+</button>
    <button id="boton-zoom-reset" type="button" aria-label="Restablecer zoom">⟳</button>
    <button id="boton-zoom-menos" type="button" aria-label="Alejar">−</button>
  </div>

  <p id="guia-exploracion" class="oculto">
    Arrastra para explorar · desplázate para acercar
  </p>

  <script type="module" src="main.js"></script>
</body>
</html>
