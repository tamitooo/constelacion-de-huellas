<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constelación de Huellas</title>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- UNIVERSO: viewport con pan y zoom -->
  <div id="universo-contenedor">
    <div id="universo-viewport">

      <!-- Fondo (imagen reemplazable desde style.css) -->
      <div id="fondo-espacial" aria-hidden="true"></div>

      <!--
        ════════════════════════════════════════════════
        CANVAS DE CONEXIONES
        ────────────────────────────────────────────────
        Vive DENTRO del viewport para que las líneas
        se transformen junto con las estrellas (pan/zoom).
        Se dibuja ANTES que capa-estrellas para que las
        estrellas queden siempre encima de las aristas.
        ════════════════════════════════════════════════
      -->
      <canvas id="capa-conexiones" aria-hidden="true"></canvas>

      <!-- Estrellas DOM (pixeladas, con brillo) -->
      <div id="capa-estrellas"></div>

    </div>
  </div>

  <!-- FORMULARIO -->
  <main id="capa-formulario">
    <h1 id="titulo-poetico">¿Qué huella permanece contigo?</h1>
    <form id="form-huella" autocomplete="off">
      <textarea
        id="input-huella"
        name="huella"
        placeholder="Escribe un recuerdo que quieras convertir en una estrella..."
        maxlength="280"
        rows="3"
        required
      ></textarea>
      <p id="contador-caracteres">280 caracteres restantes</p>
      <button id="btn-enviar" type="submit">Enviar</button>
    </form>
  </main>

  <!-- PROCESO -->
  <section id="capa-proceso" class="oculto" aria-live="polite">
    <p id="texto-proceso">El universo está leyendo tu recuerdo...</p>
    <div id="estrella-naciente" class="oculto" aria-hidden="true"></div>
    <div id="resultado-huella" class="oculto">
      <p id="resultado-categoria"></p>
      <p id="resultado-emocion"></p>
    </div>

    <!-- El botón Reintentar sí vive dentro de capa-proceso: solo
         aparece en caso de error, y en ese caso queremos que siga
         bloqueando la exploración (no hay nada útil que explorar
         todavía, la huella no se llegó a procesar). -->
    <button id="boton-reintentar" class="boton-volver oculto" type="button">
      Reintentar
    </button>
  </section>

  <!--
    Botón "Volver", pequeño y flotante en una esquina.
    Vive FUERA de #capa-proceso a propósito: cuando el resultado
    termina de mostrarse, ocultamos toda #capa-proceso (eso libera
    el pan/zoom de la cámara automáticamente) pero este botón sigue
    visible e independiente, para volver al formulario cuando el
    usuario quiera, después de explorar la constelación.
  -->
  <button id="boton-volver" class="boton-volver-flotante oculto" type="button">
    ← Volver
  </button>

  <!-- GUÍA DE EXPLORACIÓN -->
  <p id="guia-exploracion" class="oculto">
    Arrastra para explorar · desplázate para acercar
  </p>

  <script type="module" src="main.js"></script>
</body>
</html>
